version: '3.8'

services:
  # --- FRONTEND & GATEWAY ---
  api-gateway:
    image: envoyproxy/envoy:v1.30-latest
    volumes:
      - ./gateway/envoy.yaml:/etc/envoy/envoy.yaml
    ports:
      - "80:10000"
    depends_on:
      - web-frontend
      - svc-user-auth
      - svc-activity-feed

  web-frontend:
    build:
      context: ../apps/web-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"

  # --- BACKEND MICROSERVICES ---
  svc-user-auth:
    build:
      context: ../apps/svc-user-auth
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgres://user:pass@db-core:5432/user_db
      - CACHE_URL=redis://infra-cache:6379/0
    depends_on:
      - db-core
      - infra-cache

  svc-activity-feed:
    build:
      context: ../apps/svc-activity-feed
      dockerfile: Dockerfile
    environment:
      - KAFKA_BROKERS=infra-kafka:9092
      - DB_SCYLLA_HOSTS=db-activity
    depends_on:
      - db-activity
      - infra-kafka

  svc-notification:
    build:
      context: ../apps/svc-notification
      dockerfile: Dockerfile
    environment:
      - KAFKA_BROKERS=infra-kafka:9092
    ports:
      - "8081:8081"
    depends_on:
      - infra-kafka

  # --- CACHE & BROKER ---
  infra-cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  infra-kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAYGROUND:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://infra-kafka:9092,PLAYGROUND://localhost:29092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@infra-kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,PLAYGROUND://0.0.0.0:29092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'

  # --- DATABASES ---
  db-core:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: user_db
    ports:
      - "5432:5432"

  db-activity:
    image: scylladb/scylla:5.4.0
    ports:
      - "9042:9042"

  db-social-graph:
    image: neo4j:5.12-community
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"