services:
  app:
    build: .
    ports: ["3000:3000"]
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_started}
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aphelion
      POSTGRES_PASSWORD: aphelion
      POSTGRES_DB: aphelion
    volumes: ["aphelion_pgdata:/var/lib/postgresql/data"]
    healthcheck: {test: ["CMD-SHELL","pg_isready -U aphelion -d aphelion"], interval: 5s, timeout: 5s, retries: 10}
  redis:
    image: redis:7-alpine
    volumes: ["aphelion_redisdata:/data"]
volumes:
  aphelion_pgdata:
  aphelion_redisdata:
